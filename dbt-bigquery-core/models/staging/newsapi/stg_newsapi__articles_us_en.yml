version: 2

models:
  - name: stg_newsapi__articles_us_en
    description: "Staged US English articles from NewsAPI"
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          severity: warn
    columns:
      - name: _dlt_id
        description: "Unique ID from data loading tool"
        data_type: string
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('src_newsapi__articles_us_en')
              field: _dlt_id
      - name: _dlt_load_id
        description: "Load ID from data loading tool"
        data_type: string
        tests:
          - not_null
      - name: source_name
        description: "Name of the news source"
        data_type: string
        tests:
          - not_null
      - name: title
        description: "Title of the article"
        data_type: string
        tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_be_between:
              min_value: 5
              max_value: 500
      - name: url
        description: "URL to the article"
        data_type: string
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^https?://"
      - name: published_at
        description: "Publication date and time"
        data_type: timestamp
        tests:
          - not_null
      - name: language_code
        description: "Language code — always 'en' for this model"
        data_type: string
        tests:
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: ['en']
      - name: author
        description: "Author of the article"
        data_type: string
      - name: description
        description: "Description or summary of the article"
        data_type: string
      - name: image_url
        description: "URL to the article's image"
        data_type: string
      - name: content
        description: "Article content"
        data_type: string
