version: 2

models:
  - name: int_newsapi__articles
    description: "Combined articles from US English and German sources"
    meta:
      owner: "data_team_name"
      business_domain: "content"
      priority: "high"
      sla: "daily"
      business_terms:
        article: "A news article from either US or German sources"
        source_name: "The official name of the news publication"
      upstream_dependencies:
        - "NewsAPI"
      data_category: "news_content"
      update_schedule: "hourly"
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('stg_newsapi__articles_us_en')
          severity: warn
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          severity: warn
      - dbt_expectations.expect_table_columns_to_match_set:
          column_list:
            - source_name
            - author
            - title
            - description
            - url
            - image_url
            - published_at
            - content
            - language_code
            - _dlt_load_id
            - _dlt_id
            - source_table
    columns:
      - name: source_name
        description: "Name of the news source"
        data_type: string
        tests:
          - not_null
      - name: author
        description: "Author of the article"
        data_type: string
      - name: title
        description: "Title of the article"
        data_type: string
        tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_be_between:
              min_value: 5
              max_value: 500
      - name: description
        description: "Description or summary of the article"
        data_type: string
      - name: url
        description: "URL to the article"
        data_type: string
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^https?://"
      - name: image_url
        description: "URL to the article's image"
        data_type: string
      - name: published_at
        description: "Publication date and time"
        data_type: timestamp
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: timestamp
              severity: warn
      - name: content
        description: "Article content"
        data_type: string
      - name: language_code
        description: "Language code (en or de)"
        data_type: string
        tests:
          - not_null
          - accepted_values:
              values: ['en', 'de']
      - name: _dlt_load_id
        description: "Load ID from data loading tool"
        data_type: string
        tests:
          - not_null
      - name: _dlt_id
        description: "Unique ID from data loading tool"
        data_type: string
        tests:
          - not_null
          - unique
      - name: source_table
        description: "Source table identifier (us_en or de_de)"
        data_type: string
        tests:
          - not_null
          - accepted_values:
              values: ['us_en', 'de_de'] 